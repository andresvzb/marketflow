name: dbt CI

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-parse:
    name: Parse & validate dbt models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install dbt packages
        working-directory: dbt
        run: uv run dbt deps

      # dbt parse validates all SQL, refs, sources, and model configs
      # without opening a database connection — safe for CI with no live Redshift
      - name: dbt parse
        working-directory: dbt
        run: uv run dbt parse --profiles-dir ci/profiles

  sqlfluff-lint:
    name: Lint SQL with SQLFluff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install SQLFluff
        run: pip install sqlfluff

      # Uses jinja templater with apply_dbt_builtins=True (configured in dbt/.sqlfluff)
      # This stubs ref(), source(), config() etc. without needing a live dbt connection
      - name: Lint dbt models
        working-directory: dbt
        run: sqlfluff lint models/
